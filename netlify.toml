# Netlify configuration for Jack Henry deployment

[build]
  command = "npm run build:jackhenry"
  publish = "dist"

# Node version and environment variables
[build.environment]
  NODE_VERSION = "18"
  VITE_USE_FIRESTORE = "false"
  VITE_ALLOWED_AUTH_EMAIL_DOMAIN = "jackhenry.com"
  VITE_FIREBASE_API_KEY = ""
  VITE_FIREBASE_AUTH_DOMAIN = ""
  VITE_FIREBASE_PROJECT_ID = ""
  VITE_FIREBASE_STORAGE_BUCKET = ""
  VITE_FIREBASE_MESSAGING_SENDER_ID = ""
  VITE_FIREBASE_APP_ID = ""

# Redirect all routes to index.html for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Custom headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

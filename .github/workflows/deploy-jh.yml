name: Deploy JH app → Firebase (huddle-ab42f)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'functions/**'
      - 'firestore.rules'
      - 'storage.rules'
      - 'firestore.indexes.json'
      - 'package.json'
      - 'vite.config.js'
      - '.env.jackhenry'
  workflow_dispatch:

jobs:
  deploy-jh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Firebase config comes from .env.jackhenry (loaded by `vite build --mode jackhenry`).
      - name: Build JH frontend
        run: npm run build:jackhenry

      - name: Deploy hosting to JH project
        run: npx firebase deploy --project jh --only hosting:jh --token "${{ secrets.FIREBASE_TOKEN }}"

  deploy-jh-backend:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.commits[0].modified, 'functions/') ||
      contains(github.event.commits[0].modified, 'firestore.rules') ||
      contains(github.event.commits[0].modified, 'storage.rules')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: cd functions && npm ci

      - name: Deploy backend to JH project
        run: npx firebase deploy --project jh --only functions,firestore,storage --token "${{ secrets.FIREBASE_TOKEN }}"

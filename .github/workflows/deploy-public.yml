name: Deploy public app → Firebase (huddl-a3aec)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'functions/**'
      - 'firestore.rules'
      - 'storage.rules'
      - 'firestore.indexes.json'
      - 'package.json'
      - 'vite.config.js'
      - '.env.public'
  workflow_dispatch:

jobs:
  deploy-public:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Firebase config comes from .env.public (loaded by `vite build --mode public`).
      # Firebase web config is client-side/public, so it lives in version control, not secrets.
      - name: Build public frontend
        run: npm run build:public

      - name: Deploy hosting to public project
        run: npx firebase deploy --project huddl --only hosting:public --token "${{ secrets.FIREBASE_TOKEN }}"

  deploy-public-backend:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.commits[0].modified, 'functions/') ||
      contains(github.event.commits[0].modified, 'firestore.rules') ||
      contains(github.event.commits[0].modified, 'storage.rules')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: cd functions && npm ci

      - name: Deploy backend to public project
        run: npx firebase deploy --project huddl --only functions,firestore,storage --token "${{ secrets.FIREBASE_TOKEN }}"

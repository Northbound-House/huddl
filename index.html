<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Huddl</title>
    <script>
      (function () {
        try {
          var themes = ['light', 'dark', 'ocean', 'forest', 'rose'];
          var t = localStorage.getItem('huddl-theme');
          if (!t || themes.indexOf(t) === -1) t = 'light';
          document.documentElement.setAttribute('data-theme', t);
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
